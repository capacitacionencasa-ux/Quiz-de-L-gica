<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafío de Lógica - 10° Grado</title>
    <style>
        :root {
            --primary: #4a90e2; --secondary: #f39c12; --success: #2ecc71;
            --danger: #e74c3c; --dark: #2c3e50; --light: #ecf0f1;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body {
            background-color: var(--dark); display: flex; justify-content: center;
            align-items: center; min-height: 100vh; margin: 0; padding: 20px;
        }
        .quiz-container {
            background: white; width: 100%; max-width: 800px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); padding: 40px; text-align: center;
        }
        .hidden { display: none !important; }
        input[type="text"] {
            width: 80%; padding: 15px; font-size: 1.2rem; border: 2px solid var(--light);
            border-radius: 10px; margin-bottom: 20px;
        }
        .btn-main {
            background-color: var(--secondary); color: white; border: none;
            padding: 15px 40px; font-size: 1.2rem; border-radius: 50px; cursor: pointer;
        }
        .question-text { font-size: 1.5rem; font-weight: bold; margin-bottom: 25px; min-height: 80px; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .option-btn {
            background: var(--light); border: 3px solid transparent; padding: 20px;
            font-size: 1.1rem; border-radius: 15px; cursor: pointer;
        }
        .correct { background-color: var(--success) !important; color: white; }
        .incorrect { background-color: var(--danger) !important; color: white; }
        .progress-bar { height: 10px; background: #eee; border-radius: 5px; margin-bottom: 20px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.3s; }
        @media (max-width: 600px) { .options-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div id="setup-screen" class="quiz-container">
        <h1>🧠 Desafío de Lógica</h1>
        <p>Ingresa tu nombre para comenzar el registro de notas.</p>
        <input type="text" id="student-name" placeholder="Tu nombre completo..." autocomplete="off">
        <br>
        <button class="btn-main" onclick="startQuiz()">Comenzar Reto</button>
    </div>

    <div id="quiz-screen" class="quiz-container hidden">
        <div class="progress-bar"><div id="progress" class="progress-fill"></div></div>
        <div id="question-counter" style="margin-bottom: 10px; font-weight: bold;"></div>
        <div class="question-text" id="question-text"></div>
        <div class="options-grid" id="options-container"></div>
        <div id="feedback" style="margin-top: 20px; font-weight: bold; font-size: 1.2rem;"></div>
    </div>

    <div id="result-screen" class="quiz-container hidden">
        <h1>¡Quiz Finalizado!</h1>
        <h2 id="display-name"></h2>
        <div style="font-size: 3rem; margin: 20px 0;" id="final-score"></div>
        <p id="status-msg" style="color: var(--primary); font-weight: bold;">Enviando nota al profesor...</p>
        <p id="motivation-msg" style="font-size: 1.2rem; font-style: italic; margin-bottom: 20px;"></p>
        <button class="btn-main" onclick="location.reload()">Reiniciar</button>
    </div>

    <script>
        // CONFIGURACIÓN: PEGA TU URL DE SHEETDB AQUÍ ABAJO
        const SHEETDB_URL = "https://sheetdb.io/api/v1/8h579ttq03kt1"; 

        const questions = [
            { q: "¿Qué sigue en la secuencia: 2, 4, 8, 16, ...?", a: ["24", "30", "32", "64"], correct: 2 },
            { q: "Si tres gatos cazan tres ratones en tres minutos, ¿cuánto tardará un gato en cazar un ratón?", a: ["1 minuto", "3 minutos", "6 minutos", "9 minutos"], correct: 1 },
            { q: "El padre de Clara tiene 5 hijas: Lala, Lele, Lili, Lolo y...", a: ["Lulu", "Clara", "Lela", "La cuarta"], correct: 1 },
            { q: "Un tren eléctrico viaja al norte a 100km/h. El viento sopla al sur. ¿Hacia dónde va el humo?", a: ["Hacia el sur", "Hacia el norte", "Hacia arriba", "No echa humo"], correct: 3 },
            { q: "Si hoy es jueves, ¿qué día será el ayer del pasado mañana de ayer?", a: ["Miércoles", "Jueves", "Viernes", "Sábado"], correct: 0 },
            { q: "¿Qué pesa más: un kilo de hierro o un kilo de plumas?", a: ["El hierro", "Las plumas", "Pesan lo mismo", "Depende de la gravedad"], correct: 2 },
            { q: "Si 5 máquinas hacen 5 artículos en 5 minutos, ¿cuántos minutos tardarán 100 máquinas en hacer 100 artículos?", a: ["100 minutos", "50 minutos", "5 minutos", "1 minuto"], correct: 2 },
            { q: "Algunos meses tienen 31 días, otros 30. ¿Cuántos tienen 28?", a: ["1", "2", "6", "Todos"], correct: 3 },
            { q: "Si te encuentras en una carrera y pasas al que va de segundo, ¿en qué posición quedas?", a: ["Primero", "Segundo", "Tercero", "Último"], correct: 1 },
            { q: "Secuencia lógica: O, T, T, F, F, S, S, E, N, ... (One, Two, Three...)", a: ["T (Ten)", "E (Eleven)", "N (Next)", "O (Once)"], correct: 0 }
        ];

        let currentQuestion = 0;
        let score = 0;
        let studentName = "";

        function startQuiz() {
            studentName = document.getElementById('student-name').value;
            if (studentName.trim() === "") { alert("Escribe tu nombre."); return; }
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            const q = questions[currentQuestion];
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('question-counter').innerText = `Pregunta ${currentQuestion + 1} de ${questions.length}`;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            document.getElementById('feedback').innerText = '';
            document.getElementById('progress').style.width = `${(currentQuestion / questions.length) * 100}%`;

            q.a.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = option;
                btn.onclick = () => checkAnswer(index, btn);
                container.appendChild(btn);
            });
        }

        function checkAnswer(selectedIndex, btn) {
            const correctIndex = questions[currentQuestion].correct;
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(b => b.style.pointerEvents = 'none');

            if (selectedIndex === correctIndex) {
                btn.classList.add('correct');
                score++;
            } else {
                btn.classList.add('incorrect');
                buttons[correctIndex].classList.add('correct');
            }

            setTimeout(() => {
                currentQuestion++;
                if (currentQuestion < questions.length) showQuestion();
                else showResults();
            }, 1500);
        }

        async function enviarNota() {
            if (SHEETDB_URL === "TU_URL_AQUI") return;

            try {
                await fetch(SHEETDB_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        data: [{
                            nombre: studentName,
                            puntaje: score,
                            fecha: new Date().toLocaleString('es-PA')
                        }]
                    })
                });
                document.getElementById('status-msg').innerText = "✅ Nota guardada en el registro.";
            } catch (e) {
                document.getElementById('status-msg').innerText = "❌ Error al guardar. Avisa al profesor.";
            }
        }

        function showResults() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('display-name').innerText = studentName;
            document.getElementById('final-score').innerText = `${score} / ${questions.length}`;
            
            let msg = score >= 7 ? "¡Excelente razonamiento!" : "Sigue practicando, ¡vas por buen camino!";
            document.getElementById('motivation-msg').innerText = msg;
            
            enviarNota();
        }
    </script>
</body>

</html>
